<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-box{
            border: 2px solid black;
            padding: 20px;
            width: 350px;
            text-align: center;
            border-radius: 10px;
        }

        input, select{
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button{
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <div class="payment-box">
        <h2>Payment Form</h2>

        <form>
            <input type="text" placeholder="Enter Name" required><br>

            <input type="number" placeholder="Enter Amount" required><br>

            <select required>
                <option value="">Select Payment Method</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
                <option>UPI</option>
                <option>Net Banking</option>
            </select><br>

            <input type="text" placeholder="Card / UPI Number" required><br>

            <button type="submit">Pay Now</button>
        </form>
    </div>

</body>
</html>
