<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box{
            border: 2px solid black;
            padding: 20px;
            width: 300px;
            text-align: center;
        }

        input{
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button{
            padding: 8px 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Login Page</h2>

        <form>
            <input type="text" placeholder="Username"><br>

            <input type="password" placeholder="Password"><br><br>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account?
            <a href="#">Register</a>
        </p>
    </div>

</body>
</html>
