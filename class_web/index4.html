<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Scrolling</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="google.jpg" type="image/x-icon">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <!-- Carousel Start -->
    <section id="slider"
             class="carousel slide"
             data-bs-ride="carousel"
             data-bs-interval="2000">

        <!-- Indicators -->
        <div class="carousel-indicators">
            <button type="button"
                    data-bs-target="#slider"
                    data-bs-slide-to="0"
                    class="active"></button>

            <button type="button"
                    data-bs-target="#slider"
                    data-bs-slide-to="1"></button>

            <button type="button"
                    data-bs-target="#slider"
                    data-bs-slide-to="2"></button>
        </div>

        <!-- Images -->
        <div class="carousel-inner">

            <!-- First Image -->
            <div class="carousel-item active">
                <img src="download 2.gif"
                     class="d-block w-100"
                     height="450"
                     alt="Image 1">

                <div class="carousel-caption">
                    <h2>Coming Soon</h2>
                </div>
            </div>

            <!-- Second Image -->
            <div class="carousel-item">
                <img src="google.jpg"
                     class="d-block w-100"
                     height="450"
                     alt="Image 2">

                <div class="carousel-caption">
                    <h2>Watch Now</h2>
                </div>
            </div>

            <!-- Third Image -->
            <div class="carousel-item">
                <img src="amazone logo.jpg"
                     class="d-block w-100"
                     height="450"
                     alt="Image 3">

                <div class="carousel-caption">
                    <h2>Amazon.in</h2>
                </div>
            </div>

        </div>

        <!-- Previous Button -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#slider"
                data-bs-slide="prev">

            <div class="carousel-control-prev-icon"></div>

        </button>

        <!-- Next Button -->
        <button class="carousel-control-next"
                type="button"
                data-bs-target="#slider"
                data-bs-slide="next">

            <div class="carousel-control-next-icon"></div>

        </button>

    </section>
    

</body>
</html>
