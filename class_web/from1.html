<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>
    <form action="" >
        <fieldset style="width: 600px;margin-left: 400px; background-color: rgb(209, 211, 204);">
            <legend align="center" style="color: rgb(21, 5, 80);font-size: 30px;background-color: rgb(96, 156, 156);">Registration Form</legend>
            <br><br>
            <label for="name" style="margin-left: 220px;">Student Information</label><br><br>
            <label for="">Name:</label>
            <input type="text" placeholder="Frist Name" id="name" >
            <input type="text" placeholder="Middle Name">
            <input type="text" placeholder="Last Name" >
            <br><br>
            <label for="">Date of birth:</label>
            <input type="date" placeholder="Date of birth">
            <label for="">Age:</label>
            <input type="number">
            <br><br>
            <label for="">Mobile Number:</label>
            <input type="tel" placeholder="Enter your number">
            <br><br>
            <label for="">Email:</label>
            <input type="email" placeholder="Enter your email">
            <br><br>
            <label for="gen">Gender:</label>
            <input type="radio" id="gen" name="gen">Male
            <input type="radio" id="gen" name="gen">Female
            <input type="radio" id="gen" name="gen">Other
            <br><br>
            <label for="">Create Username:</label>
            <input type="text" placeholder="Create username">
            <br><br>
            <label for="">Create Password:</label>
            <input type="password" placeholder="Create password">
            <label for="">Conform Password:</label>
            <input type="password" placeholder="Conform password">
            <br><br>
            <label for="">Course:</label>
            <select name="" id="">
                <option value="Select">select</option>
                <option value="">BCA (Computer Science)</option>
                <option value="">M.SC (Data Science)</option>
                <option value="">B.Sc (Ai & ML)</option>
                <option value="">B.T (Software Engineering)</option>
            </select>
            <br><br>
            <label for="add" >Address:</label>
            <textarea  id="add" cols="50" rows="2"></textarea>
            <br><br><br>
            <a href="login.html"><button type="button" margin-left: 260px; font-size: 20px;">Submit </button></a>
      <br><br><br> </fieldset>

    </form>
</body>
</html>
