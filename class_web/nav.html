<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon website</title>

    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3LBISRwN1BubLJU1-LjMALROT0a7PgBYXn0vblNQruLF9ycsF1dGcHFo&s" type="image/x-icon">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="nav.css">
</head>
<body>

    <nav>
        <article>

            <!-- Amazon Logo -->
            <a href="#">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3LBISRwN1BubLJU1-LjMALROT0a7PgBYXn0vblNQruLF9ycsF1dGcHFo&s" alt="Amazon Logo" height="50px" width="50px">
            </a>

            <!-- Location -->
            <a href="#">
                <i class="fa-solid fa-location-dot"></i>
                Select Location
            </a>

            <!-- Search -->
            <input type="text" placeholder="Search Amazon">
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

            <!-- Sign In -->
            <a href="#">
                Hello, Sign in
            </a>

            <!-- Returns & Orders -->
            <a href="#">
                Returns & Orders
            </a>

            <!-- Cart -->
            <a href="#">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </a>

            <a href="#">
                <i class="bi bi-bag-check"> order done</i>
            </a>

        </article>
    </nav>

</body>
</html>
