<!DOCTYPE html>
<html>
<head>
    <title>class Timetable</title>
    <style>
        table{
            width: 50%;
            border-collapse: collapse;
            margin: auto;
        }

        th, td{
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }
        h2{
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>class Timetable</h2>

    <table>
        <tr>
            <th>Time</th>
            <th>Lecture</th>
            <th>Subject</th>
        </tr>

        <tr>
            <td>8:00 AM - 9:00 AM</td>
            <td>Lecture 1</td>
            <td>Java</td>
        </tr>

        <tr>
            <td>9:00 AM - 10:00 AM</td>
            <td>Lecture 2</td>
            <td>Python</td>
        </tr>

        <tr>
            <td>10:00 AM - 10:15 AM</td>
            <td colspan="2">Break</td>
        </tr>

        <tr>
            <td>10:15 AM - 11:15 AM</td>
            <td>Lecture 3</td>
            <td>Database</td>
        </tr>

        <tr>
            <td>11:15 AM - 12:15 PM</td>
            <td>Lecture 4</td>
            <td>Software Testing</td>
        </tr>

        <tr>
            <td>12:15 PM - 1:00 PM</td>
            <td colspan="2">Lunch Break</td>
        </tr>

        <tr>
            <td>1:00 PM - 2:00 PM</td>
            <td>Lecture 5</td>
            <td>Communication Skills</td>
        </tr>
        <tr>
            <td></td>
            <td colspan="1"></td>
            <td></td>
        </tr>
    </table>

</body>
</html>
